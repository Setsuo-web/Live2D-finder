<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live2D Model Database</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #08090f;
    --bg-card: #0e101a;
    --bg-panel: #13162a;
    --accent-primary: #7c5cfc;
    --accent-secondary: #fc5c9c;
    --accent-cyan: #5cf4fc;
    --accent-gold: #fcd05c;
    --text-primary: #e8e6ff;
    --text-secondary: #8885aa;
    --text-muted: #4a4870;
    --border: rgba(124,92,252,0.2);
    --border-hover: rgba(124,92,252,0.6);
    --glow: 0 0 20px rgba(124,92,252,0.3);
    --glow-strong: 0 0 40px rgba(124,92,252,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient orbs */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,92,252,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .ambient-bottom {
    position: fixed;
    bottom: -200px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(252,92,156,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(14,16,26,0.95) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: var(--glow);
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: 2px;
  }

  .header-stats {
    display: flex;
    gap: 24px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent-cyan);
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* MAIN LAYOUT */
  .layout {
    position: relative;
    z-index: 1;
    display: flex;
    height: calc(100vh - 100px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    padding: 24px 20px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Search */
  .search-wrapper {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 36px;
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: var(--text-muted); }

  .search-input:focus {
    border-color: var(--accent-primary);
    box-shadow: var(--glow);
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* Filter groups */
  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .filter-tag {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    border: 1px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .filter-tag:hover {
    background: var(--bg-panel);
    border-color: var(--border);
  }

  .filter-tag.active {
    background: rgba(124,92,252,0.15);
    border-color: var(--accent-primary);
    color: var(--accent-primary);
    box-shadow: var(--glow);
  }

  .filter-tag-count {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--bg-panel);
    padding: 2px 7px;
    border-radius: 99px;
  }

  .filter-tag.active .filter-tag-count {
    background: rgba(124,92,252,0.2);
    color: var(--accent-primary);
  }

  /* Sort */
  .sort-select {
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  /* Add button */
  .btn-add {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(124,92,252,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-add:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(124,92,252,0.45);
  }

  .btn-add:active { transform: translateY(0); }

  /* MAIN CONTENT */
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  .main-content::-webkit-scrollbar { width: 4px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* View toggle */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-text {
    font-size: 12px;
    color: var(--text-muted);
  }

  .results-text span {
    color: var(--accent-cyan);
    font-family: 'Orbitron', monospace;
    font-weight: 700;
  }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .view-btn {
    padding: 6px 10px;
    border-radius: 5px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }

  .view-btn.active {
    background: var(--accent-primary);
    color: white;
  }

  /* GRID — always single column horizontal cards */
  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CARD — horizontal layout */
  .model-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.15s;
    position: relative;
    animation: fadeInUp 0.25s ease both;
    display: flex;
    align-items: stretch;
  }

  .model-card:hover {
    border-color: var(--accent-primary);
    box-shadow: var(--glow);
    transform: translateX(3px);
  }

  /* Left: image thumbnail */
  .card-image-wrap {
    width: 96px;
    flex-shrink: 0;
    background: linear-gradient(160deg, #0d0f1e 0%, #111328 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .card-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .card-no-image {
    width: 96px;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--bg-panel), var(--bg-deep));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: var(--text-muted);
    position: relative;
  }

  /* Purchased badge — inside image area */
  .badge-purchased {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    letter-spacing: 0.04em;
    box-shadow: 0 2px 6px rgba(34,197,94,0.5);
    white-space: nowrap;
    z-index: 2;
  }

  .badge-unpurchased {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(8,9,15,0.8);
    color: var(--accent-gold);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    border: 1px solid rgba(252,208,92,0.4);
    white-space: nowrap;
    z-index: 2;
  }

  /* Gender indicator — left border accent */
  .card-gender-bar {
    width: 3px;
    flex-shrink: 0;
    align-self: stretch;
  }
  .card-gender-bar.female { background: linear-gradient(180deg, #fc5c9c, #f472b6); }
  .card-gender-bar.male   { background: linear-gradient(180deg, #5cf4fc, #38bdf8); }
  .card-gender-bar.other  { background: linear-gradient(180deg, #a78bfa, #c4b5fd); }
  .card-gender-bar.none   { background: var(--border); }

  /* Right: card content */
  .card-body {
    flex: 1;
    padding: 12px 14px 12px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .card-gender-label {
    font-size: 10px;
    color: var(--text-muted);
  }

  .card-price {
    font-size: 11px;
    color: var(--accent-gold);
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    white-space: nowrap;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
    min-height: 18px;
  }

  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
    white-space: nowrap;
  }

  .tag-vibe {
    background: rgba(124,92,252,0.15);
    color: var(--accent-primary);
    border: 1px solid rgba(124,92,252,0.3);
  }

  .tag-genre {
    background: rgba(92,244,252,0.1);
    color: var(--accent-cyan);
    border: 1px solid rgba(92,244,252,0.25);
  }

  .tag-game {
    background: rgba(252,208,92,0.1);
    color: var(--accent-gold);
    border: 1px solid rgba(252,208,92,0.25);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-link {
    font-size: 11px;
    color: var(--accent-primary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .card-link:hover { opacity: 1; }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .icon-btn:hover {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
    background: rgba(124,92,252,0.1);
  }

  .icon-btn.danger:hover {
    border-color: var(--accent-secondary);
    color: var(--accent-secondary);
    background: rgba(252,92,156,0.1);
  }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state-icon {
    font-size: 56px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,9,15,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), var(--glow);
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover {
    border-color: var(--accent-secondary);
    color: var(--accent-secondary);
  }

  .modal-body {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .form-label span {
    color: var(--accent-secondary);
    font-size: 9px;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 400;
    margin-left: 4px;
  }

  .form-input, .form-textarea, .form-select {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent-primary);
    box-shadow: var(--glow);
  }

  .form-textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  .form-hint {
    font-size: 11px;
    color: var(--text-muted);
  }

  .tag-input-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    min-height: 44px;
    align-items: center;
    cursor: text;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .tag-input-wrapper:focus-within {
    border-color: var(--accent-primary);
    box-shadow: var(--glow);
  }

  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
  }

  .tag-pill-vibe { background: rgba(124,92,252,0.2); color: var(--accent-primary); }
  .tag-pill-genre { background: rgba(92,244,252,0.15); color: var(--accent-cyan); }
  .tag-pill-game { background: rgba(252,208,92,0.15); color: var(--accent-gold); }

  .tag-pill-remove {
    cursor: pointer;
    opacity: 0.6;
    font-size: 10px;
    line-height: 1;
    transition: opacity 0.15s;
  }

  .tag-pill-remove:hover { opacity: 1; }

  .tag-text-input {
    border: none;
    background: none;
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    min-width: 80px;
    flex: 1;
  }

  .tag-text-input::placeholder { color: var(--text-muted); font-size: 12px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .modal-footer {
    padding: 16px 28px 24px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-secondary {
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: none;
    color: var(--text-secondary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  .btn-primary {
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 16px rgba(124,92,252,0.3);
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  /* DETAIL MODAL */
  .detail-image-wrap {
    position: relative;
    width: 100%;
    max-height: 320px;
    overflow: hidden;
    border-radius: 12px;
    margin-bottom: 4px;
  }

  .detail-image-wrap img {
    width: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
    max-height: 320px;
  }

  .detail-image-placeholder {
    width: 100%;
    height: 200px;
    background: var(--bg-panel);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;

  /* Active filter chips */

  }

  .active-filter-chip:hover { background: rgba(124,92,252,0.25); }

  /* Gender radio buttons */
  .gender-group {
    display: flex;

  .gender-radio {
    display: none;

  .gender-label {
    padding: 7px 16px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 12px;

    transition: all 0.2s;
    color: var(--text-secondary);

  }

  .gender-label:hover {
    border-color: var(--accent-primary);
    color: var(--accent-primary);

  .gender-radio:checked + .gender-label {
    background: rgba(124,92,252,0.2);
    border-color: var(--accent-primary);

  /* Price input */
  .price-wrap {
    position: relative;
  }

  .price-wrap .form-input {
    padding-right: 40px;
  }

  .price-unit {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);

  }

  /* Purchased toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toggle-switch {
    position: relative;
    width: 42px;
    height: 24px;
    flex-shrink: 0;
  }

  .toggle-switch input {
    opacity: 0;

  }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--bg-panel);
    border: 1px solid var(--border);

    cursor: pointer;
    transition: all 0.2s;

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--text-muted);

    transition: all 0.2s;

  .toggle-switch input:checked + .toggle-slider {
    background: rgba(34,197,94,0.2);

  }

  .toggle-switch input:checked + .toggle-slider::before {
    background: #22c55e;

    font-size: 13px;

  .filter-pill-btn:hover {
    border-color: var(--accent-primary);

  }

  .filter-pill-btn.active {
    background: rgba(124,92,252,0.15);
    border-color: var(--accent-primary);
    color: var(--accent-primary);
  }
    width: 100%;
    height: 80px;
    object-fit: cover;
    object-position: top;
    border-radius: 8px;

<body>

<div class="ambient-bottom"></div>

<!-- HEADER -->
<header>
  <div class="header-brand">
    <div class="header-icon">🎭</div>
    <div>
      <div class="header-title">LIVE2D DATABASE</div>
      <div class="header-subtitle">Model Collection Manager</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">Models</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="vibe-count">0</div>
      <div class="stat-label">Vibes</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="genre-count">0</div>
      <div class="stat-label">Genres</div>
    </div>
  </div>
</header>

<!-- DATA BAR -->
<div class="data-bar">
  <span class="data-bar-label">データ管理：</span>
  <button class="btn-data" onclick="exportData()">📤 JSON書き出し</button>
  <button class="btn-data" onclick="document.getElementById('import-file').click()">📥 JSON読み込み</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  <button class="btn-data" onclick="exportCSV()">📋 CSV書き出し</button>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="section-title">検索</div>
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="モデル名、タグで検索…" oninput="renderCards()">
      </div>
    </div>

    <div>
      <div class="section-title">雰囲気タグ</div>
      <div class="filter-group" id="vibe-filters"></div>
    </div>

    <div>
      <div class="section-title">ゲームジャンル</div>
      <div class="filter-group" id="genre-filters"></div>
    </div>

    <div>
      <div class="section-title">性別</div>
      <div class="filter-btn-group">
        <button class="filter-pill-btn" id="f-gender-all" onclick="setGenderFilter('')">すべて</button>
        <button class="filter-pill-btn" id="f-gender-female" onclick="setGenderFilter('female')">♀ 女性</button>
        <button class="filter-pill-btn" id="f-gender-male" onclick="setGenderFilter('male')">♂ 男性</button>
      </div>
    </div>

    <div>
      <div class="section-title">購入状況</div>
      <div class="filter-btn-group">
        <button class="filter-pill-btn" id="f-pur-all" onclick="setPurchasedFilter('')">すべて</button>
        <button class="filter-pill-btn" id="f-pur-yes" onclick="setPurchasedFilter('yes')">✅ 購入済み</button>
        <button class="filter-pill-btn" id="f-pur-no" onclick="setPurchasedFilter('no')">🛒 未購入</button>
      </div>
    </div>

    <div>
      <select class="sort-select" id="sort-select" onchange="renderCards()">
        <option value="name-asc">名前 A→Z</option>
        <option value="name-desc">名前 Z→A</option>
        <option value="added-desc">追加日 新しい順</option>
        <option value="added-asc">追加日 古い順</option>
        <option value="price-asc">価格 安い順</option>
        <option value="price-desc">価格 高い順</option>
      </select>
    </div>

    <div>
      <button class="btn-add" onclick="openAddModal()">
        ＋ モデルを追加
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="toolbar">
      <div class="results-text">
        <span id="filtered-count">0</span> 件表示
      </div>
    </div>
    <div id="active-filters" class="active-filters"></div>
    <div class="cards-grid" id="cards-grid"></div>
  </main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">モデルを追加</div>
      <button class="modal-close" onclick="closeFormModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">

      <div class="form-group">
        <label class="form-label">モデル名 <span>※必須</span></label>
        <input type="text" class="form-input" id="f-name" placeholder="例：桜ノ宮コハル">
      </div>

      <div class="form-group">
        <label class="form-label">キービジュアル URL</label>
        <input type="url" class="form-input" id="f-image" placeholder="https://..." oninput="previewImage()">
        <img id="image-preview" class="image-preview" alt="プレビュー">
      </div>

      <div class="form-group">
        <label class="form-label">購入ページ URL</label>
        <input type="url" class="form-input" id="f-link" placeholder="https://booth.pm/...">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">性別</label>
          <div class="gender-group">
            <input type="radio" name="f-gender" id="g-female" value="female" class="gender-radio">
            <label for="g-female" class="gender-label">♀ 女性</label>
            <input type="radio" name="f-gender" id="g-male" value="male" class="gender-radio">
            <label for="g-male" class="gender-label">♂ 男性</label>
            <input type="radio" name="f-gender" id="g-unset" value="" class="gender-radio" checked>
            <label for="g-unset" class="gender-label">未設定</label>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">価格</label>
          <div class="price-wrap">
            <input type="number" class="form-input" id="f-price" placeholder="0" min="0" step="1">
            <span class="price-unit">円</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">購入状況</label>
          <div class="toggle-row" style="height:42px">
            <label class="toggle-switch">
              <input type="checkbox" id="f-purchased">
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label" id="purchased-label">未購入</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">雰囲気タグ <span>Enterで追加</span></label>
        <div class="tag-input-wrapper" onclick="document.getElementById('f-vibe-input').focus()">
          <div id="f-vibe-pills"></div>
          <input type="text" class="tag-text-input" id="f-vibe-input" placeholder="例：クール、ダーク、可愛い…"
            onkeydown="handleTagInput(event,'vibe')">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">使えそうなゲームタイトル <span>Enterで追加</span></label>
        <div class="tag-input-wrapper" onclick="document.getElementById('f-game-input').focus()">
          <div id="f-game-pills"></div>
          <input type="text" class="tag-text-input" id="f-game-input" placeholder="例：原神、FFXIV、黒い砂漠…"
            onkeydown="handleTagInput(event,'game')">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">ゲームジャンル <span>Enterで追加</span></label>
        <div class="tag-input-wrapper" onclick="document.getElementById('f-genre-input').focus()">
          <div id="f-genre-pills"></div>
          <input type="text" class="tag-text-input" id="f-genre-input" placeholder="例：MMORPG、ローグライク、ホラー…"
            onkeydown="handleTagInput(event,'genre')">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">規約・注意事項</label>
        <textarea class="form-textarea" id="f-notes" placeholder="商用利用：不可&#10;配信利用：可（クレジット表記あり）&#10;改変：可&#10;etc..." rows="4"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeFormModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveModel()">保存する</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">モデル詳細</div>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeDetailModal()">閉じる</button>
      <button class="btn-primary" id="detail-edit-btn">✏️ 編集</button>
    </div>
  </div>
</div>

<!-- Notification -->
<div class="notification" id="notification"></div>

<script>
// ============================================================
// DATA STORE
// ============================================================
const STORAGE_KEY = 'live2d_db_v1';
let db = [];
let activeTags = { vibe: new Set(), genre: new Set() };
let activeGender = '';
let activePurchased = '';
let currentView = 'grid';
let tempTags = { vibe: [], game: [], genre: [] };
let editingId = null;

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) db = JSON.parse(raw);
  } catch(e) { db = []; }
  if (!db.length) db = getSampleData();
}

function saveDB() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}

function getSampleData() {
  return [
    {
      id: 'sample1',
      name: 'サクラ・ミツキ',
      image: '',
      link: 'https://booth.pm/',
      gender: 'female',
      price: 3300,
      purchased: true,
      vibes: ['和風', '神秘的', 'クール'],
      games: ['原神', 'FFXIV'],
      genres: ['MMORPG', 'オープンワールド'],
      notes: '商用利用：要連絡\n配信利用：可（クレジット表記必須）\n改変：可（配布禁止）',
      added: Date.now() - 86400000
    },
    {
      id: 'sample2',
      name: 'ルナ・ヴェイン',
      image: '',
      link: 'https://booth.pm/',
      gender: 'female',
      price: 5500,
      purchased: false,
      vibes: ['ダーク', 'ゴシック', 'セクシー'],
      games: ['黒い砂漠', 'ディアブロ4'],
      genres: ['ダークファンタジー', 'アクションRPG'],
      notes: '商用利用：可\n配信利用：可\n改変：不可',
      added: Date.now() - 172800000
    },
    {
      id: 'sample3',
      name: 'ピーチ・ポポ',
      image: '',
      link: 'https://booth.pm/',
      gender: 'female',
      price: 0,
      purchased: true,
      vibes: ['キュート', '元気', 'ふわふわ'],
      games: ['あつまれ どうぶつの森', 'ポケモン'],
      genres: ['カジュアル', 'コミュニティ'],
      notes: '商用利用：不可\n配信利用：可\n改変：可（クレジット必須）',
      added: Date.now()
    }
  ];
}

// ============================================================
// RENDER
// ============================================================
function getAllTags(field) {
  const set = new Set();
  db.forEach(m => (m[field] || []).forEach(t => set.add(t)));
  return [...set].sort();
}

function updateStats() {
  document.getElementById('total-count').textContent = db.length;
  document.getElementById('vibe-count').textContent = getAllTags('vibes').length;
  document.getElementById('genre-count').textContent = getAllTags('genres').length;
}

function renderSidebarFilters() {
  renderFilterGroup('vibe-filters', getAllTags('vibes'), 'vibe');
  renderFilterGroup('genre-filters', getAllTags('genres'), 'genre');
  // gender buttons
  ['all','female','male'].forEach(g => {
    const el = document.getElementById(`f-gender-${g}`);
    if (el) el.classList.toggle('active', activeGender === (g === 'all' ? '' : g));
  });
  // purchased buttons
  ['all','yes','no'].forEach(p => {
    const el = document.getElementById(`f-pur-${p}`);
    if (el) el.classList.toggle('active', activePurchased === (p === 'all' ? '' : p));
  });
}

function renderFilterGroup(containerId, tags, type) {
  const el = document.getElementById(containerId);
  if (!tags.length) { el.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:4px 0">タグなし</div>'; return; }
  el.innerHTML = tags.map(tag => {
    const count = db.filter(m => (m[type === 'vibe' ? 'vibes' : 'genres'] || []).includes(tag)).length;
    const active = activeTags[type].has(tag) ? 'active' : '';
    return `<div class="filter-tag ${active}" onclick="toggleFilter('${type}','${escHtml(tag)}')" data-tag="${escHtml(tag)}" data-type="${type}">
      <span>${escHtml(tag)}</span>
      <span class="filter-tag-count">${count}</span>
    </div>`;
  }).join('');
}

function toggleFilter(type, tag) {
  if (activeTags[type].has(tag)) activeTags[type].delete(tag);
  else activeTags[type].add(tag);
  renderSidebarFilters();
  renderCards();
  renderActiveFilters();
}

function setGenderFilter(g) {
  activeGender = g;
  renderSidebarFilters();
  renderCards();
  renderActiveFilters();
}

function setPurchasedFilter(p) {
  activePurchased = p;
  renderSidebarFilters();
  renderCards();
  renderActiveFilters();
}

function renderActiveFilters() {
  const el = document.getElementById('active-filters');
  const chips = [];
  activeTags.vibe.forEach(t => chips.push(`<div class="active-filter-chip" onclick="toggleFilter('vibe','${escHtml(t)}')">🎨 ${escHtml(t)} ✕</div>`));
  activeTags.genre.forEach(t => chips.push(`<div class="active-filter-chip" onclick="toggleFilter('genre','${escHtml(t)}')">🎮 ${escHtml(t)} ✕</div>`));
  if (activeGender) {
    const gLabel = {female:'♀ 女性', male:'♂ 男性', other:'⚧ その他'}[activeGender] || activeGender;
    chips.push(`<div class="active-filter-chip" onclick="setGenderFilter('')">${gLabel} ✕</div>`);
  }
  if (activePurchased) {
    chips.push(`<div class="active-filter-chip" onclick="setPurchasedFilter('')">${activePurchased === 'yes' ? '✅ 購入済み' : '🛒 未購入'} ✕</div>`);
  }
  if (chips.length > 1) chips.push(`<button class="clear-all-btn" onclick="clearAllFilters()">すべてクリア</button>`);
  el.innerHTML = chips.join('');
}

function clearAllFilters() {
  activeTags.vibe.clear();
  activeTags.genre.clear();
  activeGender = '';
  activePurchased = '';
  renderSidebarFilters();
  renderCards();
  renderActiveFilters();
}

function getFilteredSorted() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let results = db.filter(m => {
    const vibeOk = !activeTags.vibe.size || [...activeTags.vibe].every(t => (m.vibes || []).includes(t));
    const genreOk = !activeTags.genre.size || [...activeTags.genre].every(t => (m.genres || []).includes(t));
    const genderOk = !activeGender || (m.gender || '') === activeGender;
    const purOk = !activePurchased || (activePurchased === 'yes' ? m.purchased : !m.purchased);
    if (!vibeOk || !genreOk || !genderOk || !purOk) return false;
    if (!q) return true;
    const hay = [m.name, ...(m.vibes||[]), ...(m.games||[]), ...(m.genres||[]), m.notes||''].join(' ').toLowerCase();
    return hay.includes(q);
  });

  results.sort((a, b) => {
    if (sort === 'name-asc') return a.name.localeCompare(b.name, 'ja');
    if (sort === 'name-desc') return b.name.localeCompare(a.name, 'ja');
    if (sort === 'added-desc') return (b.added||0) - (a.added||0);
    if (sort === 'added-asc') return (a.added||0) - (b.added||0);
    if (sort === 'price-asc') return (a.price||0) - (b.price||0);
    if (sort === 'price-desc') return (b.price||0) - (a.price||0);
    return 0;
  });
  return results;
}

function genderIcon(g) {
  return { female: '♀', male: '♂' }[g] || '';
}

function genderLabel(g) {
  return { female: '女性', male: '男性' }[g] || '未設定';
}

function formatPrice(p) {
  if (p === undefined || p === null || p === '') return '';
  if (p === 0) return '無料';
  return '¥' + Number(p).toLocaleString('ja-JP');
}

function renderCards() {
  const results = getFilteredSorted();
  document.getElementById('filtered-count').textContent = results.length;
  const grid = document.getElementById('cards-grid');

  if (!results.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🎭</div>
      <h3>モデルが見つかりません</h3>
      <p style="font-size:13px;color:var(--text-muted);margin-top:6px">検索条件を変えるか、新しいモデルを追加してください</p>
    </div>`;
    return;
  }

  grid.innerHTML = results.map((m, i) => {
    const gBar = m.gender || 'none';
    const purBadge = m.purchased
      ? `<div class="badge-purchased">✓ 購入済</div>`
      : `<div class="badge-unpurchased">未購入</div>`;

    const imageEl = m.image
      ? `<div class="card-image-wrap">${purBadge}<img class="card-image" src="${escHtml(m.image)}" alt="${escHtml(m.name)}" loading="lazy" onerror="this.style.display='none'"></div>`
      : `<div class="card-no-image">${purBadge}🎭</div>`;

    const vibeTags = (m.vibes||[]).slice(0,3).map(t => `<span class="tag tag-vibe">${escHtml(t)}</span>`).join('');
    const genreTags = (m.genres||[]).slice(0,2).map(t => `<span class="tag tag-genre">${escHtml(t)}</span>`).join('');
    const allTags = vibeTags + genreTags;
    const priceStr = formatPrice(m.price);
    const gLbl = genderLabel(m.gender);

    return `<div class="model-card" style="animation-delay:${i * 0.03}s" onclick="openDetail('${m.id}')">
      <div class="card-gender-bar ${gBar}"></div>
      ${imageEl}
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${escHtml(m.name)}</div>
          <div class="card-meta">
            ${m.gender ? `<span class="card-gender-label">${gLbl}</span>` : ''}
            ${priceStr ? `<span class="card-price">${escHtml(priceStr)}</span>` : ''}
          </div>
        </div>
        <div class="card-tags">${allTags || '<span style="font-size:10px;color:var(--text-muted)">タグなし</span>'}</div>
        <div class="card-footer">
          ${m.link ? `<a class="card-link" href="${escHtml(m.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 購入ページ</a>` : '<span style="font-size:11px;color:var(--text-muted)">リンクなし</span>'}
          <div class="card-actions">
            <button class="icon-btn" title="編集" onclick="event.stopPropagation();openEditModal('${m.id}')">✏️</button>
            <button class="icon-btn danger" title="削除" onclick="event.stopPropagation();deleteModel('${m.id}')">🗑</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openDetail(id) {
  const m = db.find(x => x.id === id);
  if (!m) return;
  const body = document.getElementById('detail-body');

  const imageEl = m.image
    ? `<div class="detail-image-wrap"><img src="${escHtml(m.image)}" alt="${escHtml(m.name)}" style="max-height:340px;width:100%;object-fit:contain;background:#0d0f1e;border-radius:12px;" onerror="this.parentElement.innerHTML='<div class=\\'detail-image-placeholder\\'>🎭</div>'"></div>`
    : `<div class="detail-image-placeholder">🎭</div>`;

  const vibeTags = (m.vibes||[]).map(t => `<span class="tag tag-vibe">${escHtml(t)}</span>`).join('');
  const gameTags = (m.games||[]).map(t => `<span class="tag tag-game">${escHtml(t)}</span>`).join('');
  const genreTags = (m.genres||[]).map(t => `<span class="tag tag-genre">${escHtml(t)}</span>`).join('');

  const gIcon = genderIcon(m.gender);
  const gLbl = genderLabel(m.gender);
  const priceStr = formatPrice(m.price);
  const purStr = m.purchased ? '<span style="color:#22c55e;font-weight:700">✓ 購入済み</span>' : '<span style="color:var(--accent-gold)">未購入</span>';

  body.innerHTML = `
    ${imageEl}
    <div class="detail-name">${escHtml(m.name)}</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;font-size:13px;color:var(--text-secondary)">
      ${gIcon ? `<span>${gIcon} ${gLbl}</span>` : ''}
      ${priceStr ? `<span style="color:var(--accent-gold);font-family:'Orbitron',monospace;font-weight:700">${escHtml(priceStr)}</span>` : ''}
      ${purStr}
    </div>
    ${m.link ? `<div class="detail-link-row"><a class="detail-link" href="${escHtml(m.link)}" target="_blank" rel="noopener">🔗 ${escHtml(m.link)}</a></div>` : ''}
    ${vibeTags ? `<div class="detail-section"><div class="detail-section-title">🎨 雰囲気タグ</div><div class="detail-tags">${vibeTags}</div></div>` : ''}
    ${gameTags ? `<div class="detail-section"><div class="detail-section-title">🎮 使えそうなゲーム</div><div class="detail-tags">${gameTags}</div></div>` : ''}
    ${genreTags ? `<div class="detail-section"><div class="detail-section-title">📂 ゲームジャンル</div><div class="detail-tags">${genreTags}</div></div>` : ''}
    ${m.notes ? `<div class="detail-section"><div class="detail-section-title">📋 規約・注意事項</div><div class="detail-notes">${escHtml(m.notes)}</div></div>` : ''}
  `;

  document.getElementById('detail-edit-btn').onclick = () => { closeDetailModal(); openEditModal(id); };
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

// FORM MODAL
// ============================================================
// purchased toggle label
document.getElementById('f-purchased').addEventListener('change', function() {
  document.getElementById('purchased-label').textContent = this.checked ? '購入済み' : '未購入';
});

function openAddModal() {
  editingId = null;
  tempTags = { vibe: [], game: [], genre: [] };
  document.getElementById('modal-title').textContent = 'モデルを追加';
  document.getElementById('f-name').value = '';
  document.getElementById('f-image').value = '';
  document.getElementById('f-link').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-purchased').checked = false;
  document.getElementById('purchased-label').textContent = '未購入';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-vibe-input').value = '';
  document.getElementById('f-game-input').value = '';
  document.getElementById('f-genre-input').value = '';
  document.getElementById('image-preview').style.display = 'none';
  document.querySelector('input[name="f-gender"][value=""]').checked = true;
  renderTagPills('vibe');

function openEditModal(id) {
  const m = db.find(x => x.id === id);
  if (!m) return;
  editingId = id;
  tempTags = { vibe: [...(m.vibes||[])], game: [...(m.games||[])], genre: [...(m.genres||[])] };
  document.getElementById('modal-title').textContent = 'モデルを編集';
  document.getElementById('f-name').value = m.name || '';
  document.getElementById('f-image').value = m.image || '';
  document.getElementById('f-link').value = m.link || '';
  document.getElementById('f-price').value = m.price !== undefined ? m.price : '';
  document.getElementById('f-purchased').checked = !!m.purchased;
  document.getElementById('purchased-label').textContent = m.purchased ? '購入済み' : '未購入';
  document.getElementById('f-notes').value = m.notes || '';
  const genderVal = m.gender || '';
  const genderRadio = document.querySelector(`input[name="f-gender"][value="${genderVal}"]`);
  if (genderRadio) genderRadio.checked = true;
  renderTagPills('vibe');
  renderTagPills('game');
  renderTagPills('genre');
  previewImage();
  document.getElementById('form-modal').classList.add('open');
}

function closeFormModal() {
  document.getElementById('form-modal').classList.remove('open');
}

function handleTagInput(e, type) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,/g, '');
    if (val && !tempTags[type].includes(val)) {
      tempTags[type].push(val);
      renderTagPills(type);
    }
    e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value && tempTags[type].length) {
    tempTags[type].pop();
    renderTagPills(type);
  }
}

function renderTagPills(type) {
  const ids = { vibe: 'f-vibe-pills', game: 'f-game-pills', genre: 'f-genre-pills' };
  const cls = { vibe: 'tag-pill-vibe', game: 'tag-pill-game', genre: 'tag-pill-genre' };
  const el = document.getElementById(ids[type]);
  el.innerHTML = tempTags[type].map((t, i) =>
    `<span class="tag-pill ${cls[type]}">${escHtml(t)}<span class="tag-pill-remove" onclick="removeTag('${type}',${i})">✕</span></span>`
  ).join('');
}

function removeTag(type, i) {
  tempTags[type].splice(i, 1);
  renderTagPills(type);
}

function previewImage() {
  const url = document.getElementById('f-image').value.trim();
  const img = document.getElementById('image-preview');
  if (url) { img.src = url; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
}

function saveModel() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showNotification('❌ モデル名は必須です'); return; }

  const genderRadio = document.querySelector('input[name="f-gender"]:checked');
  const priceRaw = document.getElementById('f-price').value;

  const model = {
    id: editingId || 'model_' + Date.now(),
    name,
    image: document.getElementById('f-image').value.trim(),
    link: document.getElementById('f-link').value.trim(),
    gender: genderRadio ? genderRadio.value : '',
    price: priceRaw !== '' ? Number(priceRaw) : null,
    purchased: document.getElementById('f-purchased').checked,
    vibes: [...tempTags.vibe],
    games: [...tempTags.game],
    genres: [...tempTags.genre],
    notes: document.getElementById('f-notes').value.trim(),
    added: editingId ? (db.find(x => x.id === editingId)?.added || Date.now()) : Date.now()
  };

  if (editingId) {
    const idx = db.findIndex(x => x.id === editingId);
    if (idx !== -1) db[idx] = model;
  } else {
    db.unshift(model);
  }

  saveDB();
  closeFormModal();
  fullRefresh();
  showNotification(editingId ? '✅ 更新しました' : '✅ 追加しました');
}

function deleteModel(id) {
  if (!confirm('このモデルを削除しますか？')) return;
  db = db.filter(x => x.id !== id);
  saveDB();
  fullRefresh();
  showNotification('🗑 削除しました');
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'live2d-database.json';
  a.click();
  showNotification('📤 JSONを書き出しました');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();
      if (!confirm(`${imported.length}件のデータを読み込みます。現在のデータは上書きされます。`)) return;
      db = imported;
      saveDB();
      fullRefresh();
      showNotification(`📥 ${imported.length}件読み込みました`);
    } catch { showNotification('❌ JSONの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportCSV() {
  const headers = ['名前', '性別', '価格(円)', '購入済み', '画像URL', '購入URL', '雰囲気タグ', 'ゲームタイトル', 'ジャンル', '規約・注意事項', '追加日'];
  const gLabel = {female:'女性', male:'男性', other:'その他'};
  const rows = db.map(m => [
    m.name,
    gLabel[m.gender] || '未設定',
    m.price !== null && m.price !== undefined ? m.price : '',
    m.purchased ? '購入済み' : '未購入',
    m.image, m.link,
    (m.vibes||[]).join('|'), (m.games||[]).join('|'), (m.genres||[]).join('|'),
    (m.notes||'').replace(/\n/g,'\\n'), new Date(m.added||0).toLocaleDateString('ja-JP')
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'live2d-database.csv';
  a.click();
  showNotification('📋 CSVを書き出しました');
}

// ============================================================
// UTILS
// ============================================================
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showNotification(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function fullRefresh() {
  updateStats();
  renderSidebarFilters();
  renderCards();
  renderActiveFilters();
}

// Close modals on overlay click
document.getElementById('form-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeFormModal(); });
document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetailModal(); });

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeFormModal(); closeDetailModal(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search-input').focus(); }
});
